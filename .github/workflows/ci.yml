name: CI

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]
  workflow_dispatch:

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_NOLOGO: true
  NUGET_XML_DOC_MODE: skip

jobs:
  # ──────────────────────────────────────────────
  # 单元测试
  # ──────────────────────────────────────────────
  test:
    name: 单元测试
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test_project:
          - Tests/Mud.HttpUtils.Generator.Tests/Mud.HttpUtils.Generator.Tests.csproj
          - Tests/Mud.HttpUtils.Client.Tests/Mud.HttpUtils.Client.Tests.csproj
          - Tests/Mud.HttpUtils.Resilience.Tests/Mud.HttpUtils.Resilience.Tests.csproj
          - Tests/Mud.HttpUtils.JsonContextScaffolder.Tests/Mud.HttpUtils.JsonContextScaffolder.Tests.csproj

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore dependencies
        run: dotnet restore ${{ matrix.test_project }}

      - name: Build
        run: dotnet build ${{ matrix.test_project }} --no-restore --configuration Release

      - name: Run tests
        run: dotnet test ${{ matrix.test_project }} --no-build --configuration Release --logger "console;verbosity=detailed"

  # ──────────────────────────────────────────────
  # Demo 项目构建
  # ──────────────────────────────────────────────
  build-demos:
    name: Demo 构建
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        demo_project:
          - Demos/HttpClientApiDemo/HttpClientApiDemo.csproj
          - Demos/HttpClientApiPublicDemo/HttpClientApiPublicDemo.csproj
          - Demos/HttpClientDemo/HttpClientDemo.csproj
          - Demos/ResilienceDemo/ResilienceDemo.csproj

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore dependencies
        run: dotnet restore ${{ matrix.demo_project }}

      - name: Build
        run: dotnet build ${{ matrix.demo_project }} --no-restore --configuration Release

  # ──────────────────────────────────────────────
  # Native AOT 发布验证
  # ──────────────────────────────────────────────
  aot-publish:
    name: AOT 发布验证 (${{ matrix.rid }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: windows-latest
            rid: win-x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      # Native AOT 需要目标平台的原生工具链
      # Ubuntu: clang, zlib1g-dev 已预装在 github runner 中
      # Windows: MSVC 已预装
      - name: Install AOT prerequisites (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang zlib1g-dev

      - name: Publish AOT (net10.0)
        run: dotnet publish Demos/AotVerificationDemo/AotVerificationDemo.csproj -c Release -f net10.0 -r ${{ matrix.rid }} -p:AotStrictMode=true

      - name: Publish AOT (net8.0)
        run: dotnet publish Demos/AotVerificationDemo/AotVerificationDemo.csproj -c Release -f net8.0 -r ${{ matrix.rid }} -p:AotStrictMode=true

      - name: Run AOT binary (net10.0) and verify AOT_OK
        shell: bash
        run: |
          BIN_PATH="Demos/AotVerificationDemo/bin/Release/net10.0/${{ matrix.rid }}/publish/AotVerificationDemo"
          if [ -f "$BIN_PATH" ]; then
            OUTPUT=$("$BIN_PATH" 2>&1 || true)
            echo "$OUTPUT"
            if echo "$OUTPUT" | grep -q "AOT_OK"; then
              echo "✓ AOT runtime verification passed (net10.0)"
            else
              echo "✗ AOT runtime verification FAILED (net10.0) - AOT_OK not found in output"
              exit 1
            fi
          else
            echo "Binary not found at $BIN_PATH"
            exit 1
          fi

      - name: Run AOT binary (net8.0) and verify AOT_OK
        shell: bash
        run: |
          BIN_PATH="Demos/AotVerificationDemo/bin/Release/net8.0/${{ matrix.rid }}/publish/AotVerificationDemo"
          if [ -f "$BIN_PATH" ]; then
            OUTPUT=$("$BIN_PATH" 2>&1 || true)
            echo "$OUTPUT"
            if echo "$OUTPUT" | grep -q "AOT_OK"; then
              echo "✓ AOT runtime verification passed (net8.0)"
            else
              echo "✗ AOT runtime verification FAILED (net8.0) - AOT_OK not found in output"
              exit 1
            fi
          else
            echo "Binary not found at $BIN_PATH"
            exit 1
          fi

  # ──────────────────────────────────────────────
  # NuGet 包消费方 AOT 发布验证（PackageReference 路径）
  # ──────────────────────────────────────────────
      # [AOT v4 Phase 21.1 / D12] XML 路径在 AOT 下的拒绝验证（AOT007）。
      # 使用 github.workspace 传递路径，临时项目创建在仓库子目录下以自动继承 Directory.Build.props。
      # 仅设置 IsAotCompatible=true（触发 AOT007 分析器的 AOT 上下文检测）；不设置 PublishAot=true，
      # 因 dotnet build 即可触发 AOT007 编译期诊断，无需实际 AOT 发布。
      - name: Verify XML path is rejected in AOT (AOT007)
        shell: bash
        env:
          WORKSPACE: ${{ github.workspace }}
        run: |
          TEST_DIR="$WORKSPACE/.tmp-xml-aot-test"
          mkdir -p "$TEST_DIR"
          cat > "$TEST_DIR/Test.csproj" << 'EOF'
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup>
              <OutputType>Exe</OutputType>
              <TargetFramework>net10.0</TargetFramework>
              <IsAotCompatible>true</IsAotCompatible>
            </PropertyGroup>
            <ItemGroup>
              <ProjectReference Include="..\Mud.HttpUtils.Client\Mud.HttpUtils.Client.csproj" />
              <ProjectReference Include="..\Mud.HttpUtils.Generator\Mud.HttpUtils.Generator.csproj" OutputItemType="Analyzer" />
            </ItemGroup>
            <!-- [D18] ProjectReference 场景需显式注册 CompilerVisibleProperty，
                 否则 AotXmlRejectionAnalyzer 读不到 build_property.IsAotCompatible，AOT007 不会触发。 -->
            <ItemGroup>
              <CompilerVisibleProperty Include="IsAotCompatible" />
              <CompilerVisibleProperty Include="PublishAot" />
            </ItemGroup>
          </Project>
          EOF
          cat > "$TEST_DIR/Program.cs" << 'EOF'
          using Mud.HttpUtils.Attributes;
          [HttpClientApi]
          public interface IXmlApi
          {
              [Post("/api/data"), SerializationMethod(SerializationMethod.Xml)]
              System.Threading.Tasks.Task<string> PostDataAsync([Body] MyDto data);
          }
          public class MyDto { public string Name { get; set; } }
          EOF
          if dotnet build "$TEST_DIR/Test.csproj" -p:AotStrictMode=true 2>&1 | grep -q "AOT007"; then
            echo "✓ AOT007 correctly reported for XML path in AOT"
          else
            echo "✗ AOT007 not reported for XML path in AOT"
            exit 1
          fi
          rm -rf "$TEST_DIR"

  aot-packageref:
    name: AOT PackageRef 验证
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Install AOT prerequisites (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y clang zlib1g-dev

      - name: Restore solution
        run: dotnet restore Mud.HttpUtils.slnx

      - name: Build solution
        run: dotnet build Mud.HttpUtils.slnx --no-restore --configuration Release

      - name: Pack all projects to artifacts/
        run: |
          dotnet pack Mud.HttpUtils.Abstractions/Mud.HttpUtils.Abstractions.csproj --no-build --configuration Release --output artifacts
          dotnet pack Mud.HttpUtils.Attributes/Mud.HttpUtils.Attributes.csproj --no-build --configuration Release --output artifacts
          dotnet pack Mud.HttpUtils.Client/Mud.HttpUtils.Client.csproj --no-build --configuration Release --output artifacts
          dotnet pack Mud.HttpUtils.Resilience/Mud.HttpUtils.Resilience.csproj --no-build --configuration Release --output artifacts
          dotnet pack Mud.HttpUtils/Mud.HttpUtils.csproj --no-build --configuration Release --output artifacts
          dotnet pack Mud.HttpUtils.Generator/Mud.HttpUtils.Generator.csproj --no-build --configuration Release --output artifacts
          dotnet pack Mud.HttpUtils.OpenTelemetry/Mud.HttpUtils.OpenTelemetry.csproj --no-build --configuration Release --output artifacts
          # [AOT v4 Phase 17.2 / D3] 补齐 Scaffolder 工具包，PackageRef 模式下脚手架才能工作（被现有 nuget.config 的 local 源自动识别）
          dotnet pack Tools/Mud.HttpUtils.JsonContextScaffolder/Mud.HttpUtils.JsonContextScaffolder.csproj --no-build --configuration Release --output artifacts


      - name: Restore AotPackageRefDemo (local NuGet source)
        run: dotnet restore Demos/AotPackageRefDemo/AotPackageRefDemo.csproj

      - name: Publish AOT (PackageReference, net8.0)
        run: dotnet publish Demos/AotPackageRefDemo/AotPackageRefDemo.csproj -c Release -f net8.0 -r linux-x64 -p:AotStrictMode=true --no-restore -o Demos/AotPackageRefDemo/publish-net8

      - name: Publish AOT (PackageReference, net10.0)
        run: dotnet publish Demos/AotPackageRefDemo/AotPackageRefDemo.csproj -c Release -f net10.0 -r linux-x64 -p:AotStrictMode=true --no-restore -o Demos/AotPackageRefDemo/publish-net10

      - name: Run AOT binary (net8.0) and verify AOT_OK
        shell: bash
        run: |
          BIN_PATH="Demos/AotPackageRefDemo/publish-net8/AotPackageRefDemo"
          if [ -f "$BIN_PATH" ]; then
            OUTPUT=$("$BIN_PATH" 2>&1 || true)
            echo "$OUTPUT"
            if echo "$OUTPUT" | grep -q "AOT_OK"; then
              echo "✓ AOT PackageRef verification passed (net8.0)"
            else
              echo "✗ AOT PackageRef verification FAILED (net8.0) - AOT_OK not found in output"
              exit 1
            fi
          else
            echo "Binary not found at $BIN_PATH"
            exit 1
          fi

      - name: Run AOT binary (net10.0) and verify AOT_OK
        shell: bash
        run: |
          BIN_PATH="Demos/AotPackageRefDemo/publish-net10/AotPackageRefDemo"
          if [ -f "$BIN_PATH" ]; then
            OUTPUT=$("$BIN_PATH" 2>&1 || true)
            echo "$OUTPUT"
            if echo "$OUTPUT" | grep -q "AOT_OK"; then
              echo "✓ AOT PackageRef verification passed (net10.0)"
            else
              echo "✗ AOT PackageRef verification FAILED (net10.0) - AOT_OK not found in output"
              exit 1
            fi
          else
            echo "Binary not found at $BIN_PATH"
            exit 1
          fi

  # ──────────────────────────────────────────────
  # 主项目及子包构建与发布
  # ──────────────────────────────────────────────
  build-and-pack:
    name: 构建与发布
    runs-on: ubuntu-latest
    needs: [ test ]
    if: github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            6.0.x
            8.0.x
            10.0.x

      - name: Restore dependencies
        run: dotnet restore Mud.HttpUtils.slnx

      - name: Build solution
        run: dotnet build Mud.HttpUtils.slnx --no-restore --configuration Release

      - name: Pack Abstractions
        run: dotnet pack Mud.HttpUtils.Abstractions/Mud.HttpUtils.Abstractions.csproj --no-build --configuration Release --output artifacts

      - name: Pack Attributes
        run: dotnet pack Mud.HttpUtils.Attributes/Mud.HttpUtils.Attributes.csproj --no-build --configuration Release --output artifacts

      - name: Pack Client
        run: dotnet pack Mud.HttpUtils.Client/Mud.HttpUtils.Client.csproj --no-build --configuration Release --output artifacts

      - name: Pack Resilience
        run: dotnet pack Mud.HttpUtils.Resilience/Mud.HttpUtils.Resilience.csproj --no-build --configuration Release --output artifacts

      - name: Pack Mud.HttpUtils (meta package)
        run: dotnet pack Mud.HttpUtils/Mud.HttpUtils.csproj --no-build --configuration Release --output artifacts

      - name: Pack Generator
        run: dotnet pack Mud.HttpUtils.Generator/Mud.HttpUtils.Generator.csproj --no-build --configuration Release --output artifacts

      - name: Pack JsonContextScaffolder (dotnet tool)
        run: dotnet pack Tools/Mud.HttpUtils.JsonContextScaffolder/Mud.HttpUtils.JsonContextScaffolder.csproj --configuration Release --output artifacts

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/*.nupkg
          retention-days: 30

  # ──────────────────────────────────────────────
  # 发布到 NuGet（仅 tag 触发）
  # ──────────────────────────────────────────────
  publish-nuget:
    name: 发布到 NuGet
    runs-on: ubuntu-latest
    needs: [ build-and-pack ]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: artifacts

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish to NuGet
        run: dotnet nuget push artifacts/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
